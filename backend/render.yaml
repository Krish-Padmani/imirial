services:
  - type: web
    name: imirial-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        scope: build,runtime
      - key: JWT_SECRET
        scope: build,runtime
      - key: ADMIN_EMAIL
        scope: build,runtime
      - key: ADMIN_PASSWORD
        scope: build,runtime
      - key: PORT
        value: 5000
